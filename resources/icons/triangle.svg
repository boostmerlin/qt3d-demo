<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
    <!-- 三维盒子的主体 -->
    <rect x="50" y="50" width="100" height="50" fill="#ddd" stroke="black" stroke-width="2"/>
    <polygon points="50,50 100,25 150,50" fill="#ddd" stroke="black" stroke-width="2"/>
    <polygon points="50,100 100,75 150,100" fill="#ddd" stroke="black" stroke-width="2"/>

    <!-- 三维盒子的边框 -->
    <line x1="50" y1="50" x2="50" y2="100" stroke="black" stroke-width="2"/>
    <line x1="150" y1="50" x2="150" y2="100" stroke="black" stroke-width="2"/>
    <line x1="100" y1="25" x2="100" y2="75" stroke="black" stroke-width="2"/>
</svg>